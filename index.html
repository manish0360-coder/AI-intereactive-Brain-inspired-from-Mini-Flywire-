function findNeuronById(id) {
  return group.children.find(obj =>

// 🌈 COLOR HELPER (ADD THIS)
function getWaveColor(t) {
  // t = progress (0 → 1)

  if (t < 0.5) {
    return new THREE.Color(1, 1 - t * 2, 0); // yellow → orange
  } else {
    return new THREE.Color(1, (1 - t) * 2, 0); // orange → red
  }
}

function runPrediction(startKey) {

  let currentKey = startKey;
  const STEPS = 3;

  for (let step = 0; step < STEPS; step++) {

    const memoryMap = transitions.get(currentKey) || new Map();
    const structureMap = new Map();

    const startNeuron = findNeuronById(currentKey);
    if (!startNeuron) return;

    for (let i = 0; i < Math.min(lines.length, 50); i++) {
      const line = lines[i];

      if (line.userData.start.distanceTo(startNeuron.position) < 0.001) {

        const next = group.children.find(n =>
          n.userData.isNeuron &&
          n.position.distanceTo(line.userData.end) < 0.001
        );

        if (next) structureMap.set(next.userData.id, 1);
      }

      if (line.userData.end.distanceTo(startNeuron.position) < 0.001) {

        const next = group.children.find(n =>
          n.userData.isNeuron &&
          n.position.distanceTo(line.userData.start) < 0.001
        );

        if (next) structureMap.set(next.userData.id, 1);
      }

    };

    const choices = [];

    memoryMap.forEach((value, k) => {
      choices.push({ key: k, weight: value * 10 });
    });

    structureMap.forEach((value, k) => {
      if (!choices.find(c => c.key === k)) {
        choices.push({ key: k, weight: value });
      }
    });

    if (choices.length === 0) return;

    let total = 0;
    choices.forEach(c => total += c.weight);

    let r = Math.random() * total;
    let running = 0;
    let bestKey = null;

    for (let i = 0; i < choices.length; i++) {
      running += choices[i].weight;
      if (r <= running) {
        bestKey = choices[i].key;
        break;
      }
    }

    const neuron = findNeuronById(bestKey);
    console.log("predicted ->", bestKey);
    if (!neuron) return;

    // 🔥 VISUAL (safe, no loop spam)
    neuron.material.color.set(0xff0000);
    neuron.scale.set(1.5, 1.5, 1.5);

    setTimeout(() => {
      if (neuron) neuron.material.color.set(0xffffff);
      neuron.scale.set(0.5, 0.5, 0.5);
    }, 400);

    currentKey = bestKey;
  }
}

// ---------------- CLICK ----------------
window.addEventListener('click', (event) => {

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  // only detect neurons
  let selected = null;

  // 1. try exact hit first
  const intersects = raycaster.intersectObjects(group.children);

  for (let i = 0; i < intersects.length; i++) {
    const obj = intersects[i].object;

    if (obj.userData.isNeuron) {
      selected = obj;
      console.log("🎯 Exact neuron click");
      break;
    }
  }

  // 2. fallback to nearest
  if (!selected) {

    let minDist = Infinity;

    group.children.forEach(obj => {
      if (!obj.userData.isNeuron) return;

      const dist = obj.position.distanceTo(raycaster.ray.origin);

      if (dist < minDist) {
        minDist = dist;
        selected = obj;
      }
    });

    console.log("🤖 Nearest neuron selected");
  }

  if (intersects.length === 0) {
    console.log('No neuron clicked');
    return;
  }
  console.log("Neuron clicked");
  
  // reset wave state
  lines.forEach(line => {
    line.userData.activated = false;
  });

  if (!selected.userData.isNeuron) return;
  // save thought
  thoughtTrail.push(selected);
  runPrediction(selected.userData.id);
  
  // 🧠 learn transition
  if (thoughtTrail.length > 1) {

    const prev = thoughtTrail[thoughtTrail.length - 2];
    const curr = thoughtTrail[thoughtTrail.length - 1];

    if (!prev || !curr || prev.userData.id === undefined || curr.userData.id === undefined) return;
    
    const key = prev.userData.id;     // use id

    const map = transitions.get(key) || new Map();

    const currKey = curr.userData.id;

    map.set(currKey, (map.get(currKey) || 0) + 3);

    transitions.set(key, map);
  }
  // keep only last few
  if (thoughtTrail.length > MAX_TRAIL) {
    thoughtTrail.shift();
  }

  // reset old
  if (selectedNeuron) {
    selectedNeuron.scale.set(1,1,1);
  }
  // restore clusters
  group.children.forEach(obj => {
    if (obj.userData.isCluster) {
      obj.material.opacity = 1;
    }
  });

  // highlight new
  // we comment this because of growing big circle that hides neuron
  //selected.scale.set(3,3,3);    
  selected.scale.set(1.5, 1.5, 1.5);
  selected.material.color.set(0xffff00);
  selectedNeuron = selected;
  // 🧠 fade big clusters when selecting neuron
  group.children.forEach(obj => {
    if (obj.userData.isCluster) {
      obj.material.opacity = 0.2;
      obj.material.transparent = true;
    }
  });

    // camera
  // isRotating = false;
  // cameraTarget.copy(selected.position);
  // isZooming = true;


  // start wave on click
  if (isWaveActive) return;
  waveQueue.length = 0;
  isWaveActive = true;
  activeLines.length = 0;

  lines.forEach(line => {
    const { start } = line.userData;

    if (
      start.distanceTo(selected.position) < 0.01 ||
      line.userData.end.distanceTo(selected.position) < 0.01
    ) {

      // add to memory
      // increases memory strength
      const oldStrength = memoryLines.get(line) || 0;
      memoryLines.set(line, oldStrength + 5);
      line.material.color.set(0xffff00);
      activeLines.push(line);
      // 👉 ADD THIS LINE (VERY IMPORTANT)
      line.userData.activated = true;
      waveQueue.push({
        line: line,
        progress: 0
      });
    }
  });



  // remove old signals
  lineSignals.forEach(s => group.remove(s));
  lineSignals.length = 0;

  // create new yellow signals
  activeLines.forEach(line => {
    if (lineSignals.length > 15) return;
    const signal = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 8, 8),
      new THREE.MeshBasicMaterial({
        color: 0xffff00,
        transparent: true,
        opacity: 0.9
       })
    );

    signal.userData = {
      line: line,
      progress: Math.random()
    };

    group.add(signal);
    lineSignals.push(signal);
  });


});

// 🖱️ MOUSE DOWN
window.addEventListener('mousedown', (event) => {
  isDragging = true;
  previousMousePosition.x = event.clientX;
  previousMousePosition.y = event.clientY;
});

// 🖱️ MOUSE UP
window.addEventListener('mouseup', () => {
  isDragging = false;
});

// 🖱️ MOUSE MOVE
window.addEventListener('mousemove', (event) => {

  if (!isDragging) return;

  const deltaX = event.clientX - previousMousePosition.x;
  const deltaY = event.clientY - previousMousePosition.y;

  group.rotation.y += deltaX * 0.005;
  group.rotation.x += deltaY * 0.005;

  previousMousePosition.x = event.clientX;
  previousMousePosition.y = event.clientY;
});

// 🔍 MOUSE WHEEL ZOOM (ADD THIS)
window.addEventListener('wheel', (event) => {

  camera.position.z += event.deltaY * 0.002;
  // limit zoom
  camera.position.z = Math.max(1, Math.min(10, camera.position.z));

});

// 🟡 HOVER EFFECT (ADD THIS)
window.addEventListener('mousemove', (event) => {

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObjects(group.children);

  // 🧼 reset previous hover
  if (hoveredNeuron && hoveredNeuron !== selectedNeuron) {
    hoveredNeuron.material.color.set(0xffffff);
    hoveredNeuron.scale.set(1, 1, 1);
    hoveredNeuron = null;
  }

  if (intersects.length > 0) {

    const obj = intersects[0].object;

    // only hover small neurons (not clusters)
    if (obj.userData.isNeuron && obj !== selectedNeuron) {

      obj.material.color.set(0xffff00);
      obj.scale.set(2, 2, 2);

      hoveredNeuron = obj;
    }
