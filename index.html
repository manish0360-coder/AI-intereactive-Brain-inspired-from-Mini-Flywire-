// 🧠 CREATE STRONGER EMBEDDING VECTOR
function createEmbedding(size = 32) {
  
  // empty vector
  const vec = [];
  
  // create many dimensions
  for (let i = 0; i < size; i++) {
    
    // random number between -1 and +1
    vec.push(Math.random() * 2 - 1);
  }
  
  // normalize vector
  return normalize(vec);
}

// 🧠 DOT PRODUCT (how similar 2 neurons are)
function dot(a, b) {
  if (!a || !b) return 0;
  
  let sum = 0;
  
  for (let i = 0; i < a.length; i++) {
    sum += a[i] * b[i];
  }
  
  return sum;
}

// 🧠 TRAIN EMBEDDINGS (learning step)
function trainEmbedding(id1, id2) {
  
  const n1 = findNeuronById(id1);
  const n2 = findNeuronById(id2);
  
  if (!n1 || !n2) return;
  
  const emb1 = n1.userData.embedding;
  const emb2 = n2.userData.embedding;
  
  const lr = 0.02;
  
  // ===== MAKE THEM SIMILAR =====
  for (let i = 0; i < emb1.length; i++) {
    
    const diff = emb2[i] - emb1[i];
    
    emb1[i] += diff * lr;
    emb2[i] -= diff * lr;
  }
  
  normalize(emb1);
  normalize(emb2);
  
  //normalize all neurons slowly
  neuronMap.forEach((n) => {
    normalize(n.userData.embedding);
  });
  
  // ===== PUSH OTHERS AWAY =====
  neuronMap.forEach((other, id) => {
    
    if (id === id1 || id === id2) return;
    
    const embOther = other.userData.embedding;
    
    for (let i = 0; i < emb1.length; i++) {
      
      const diff = embOther[i] - emb1[i];
      
      embOther[i] += diff * 0.002;
    }
    
  });
  
  console.log("🔥 Embedding trained:", id1, "<->", id2);
}

function similarity(a, b) {
  let dot = 0;
  
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
  }
  
  return dot; // bigger = more similar
}

function normalize(vec) {
  
  let mag = 0;
  
  for (let i = 0; i < vec.length; i++) {
    mag += vec[i] * vec[i];
  }
  
  mag = Math.sqrt(mag);
  
  if (mag === 0) return vec;
  
  for (let i = 0; i < vec.length; i++) {
    vec[i] /= mag;
  }
  
  return vec;
}

// get Q value (if not learned → return 0)
function getQ(state, action) {

// 🧠 LOOK-AHEAD FUNCTION (----*****------   future thinking  ------******-------...............----------->>>>>>>>>>>>>>)
function lookAheadScore(startId, goalId, depth = 2) {
  // startId = where we are now
  // goalId = where we want to go
  // depth = how many steps we look ahead
  
  if (!goalId) return 0;
  // if no goal → no future thinking
  
  const visited = new Set();
  // we remember where we already went (to avoid looping)
  
  function dfs(currentId, d) {
    // dfs = explore paths step by step
    // currentId = current node
    // d = how many steps left
    
    if (d === 0) return 0;
    // no steps left → stop
    
    const neuron = findNeuronById(currentId);
    const goalNeuron = findNeuronById(goalId);
    
    if (!neuron || !goalNeuron) return 0;
    // if something missing → stop
    
    // 🎯 how close current node is to goal
    let best = similarity(
    neuron.userData.embedding,
    goalNeuron.userData.embedding
  );
  
  visited.add(currentId);
  // mark this node as visited
  
  neuron.userData.neighbors.forEach(nextId => {
    // check all next possible nodes
    
    if (visited.has(nextId)) return;
    // don't go back to same place
    
    const future = dfs(nextId, d - 1);
    // go one step deeper (future thinking)
    
    // combine current + future
    best = Math.max(best, future * 2);
    // if future path is better → take it
  });
  
  visited.delete(currentId);
  // remove from visited (so other paths can use it)
  
  return best;
  // return best future score
}

return dfs(startId, depth);
// start exploring from current node
}

// 🧠 REACHABILITY CHECK (true reasoning)
// This function checks: "Can this node reach the goal in few steps?"
function canReachGoal(startId, goalId, maxDepth = 4) {
  
  // If no goal → allow everything
  if (!goalId) return true;
  
  const visited = new Set(); // remember visited nodes
  
  // DFS = explore neighbors step by step
  function dfs(currentId, depth) {
    
    // stop if depth finished
    if (depth === 0) return false;
    
    // 🎯 reached goal → success
    if (currentId === goalId) return true;
    
    visited.add(currentId);
    
    const neuron = findNeuronById(currentId);
    if (!neuron) return false;
    
    // check all neighbors
    for (let nextId of neuron.userData.neighbors) {
      
      // skip already visited (avoid loop)
      if (visited.has(nextId)) continue;
      
      // if ANY path reaches goal → true
      if (dfs(nextId, depth - 1)) return true;
    }
    
    return false; // no path found
  }
  
  return dfs(startId, maxDepth);
}


// ========================================
// 🧠 REAL FUTURE THINKING
// Brain imagines future chains
// Example:
// lion -> hunt -> meat -> eat
// ========================================

function futureScore(startId, depth = 4) {
  // remember visited nodes
  const visited = new Set();  

  // stop if depth finished
  if (depth <= 0) {
     return 0; // no future left
  }

  // get neuron
  const neuron = findNeuronById(startId);

  // safety check
  if (!neuron) {
    return 0;
  }

  // best future found
  let best = 0;

  neuron.userData.neighbors.forEach(nextId => {

    // 🚫 stop infinite loops
    if (visited.has(nextId)) {
        return;
    }

    // mark visited
    visited.add(nextId);

    // =========================
    // reward memory
    // =========================

    const rewardKey =
        startId + "->" + nextId;

    const reward =
        rewards.get(rewardKey) || 0;

    const penalty =
        penalties.get(rewardKey) || 0;

    const q =
        getQ(startId, nextId);

    const visits =
        curiosityMap.get(rewardKey) || 0;

    const curiosity =
        1 / (visits + 1);

    // future imagination
    const future =
        futureScore(nextId, depth - 1);

    // 🧠 VERY IMPORTANT
    // reduce future domination
    const total =

        reward * 1.0 +

        q * 1.2 -

        penalty * 1.0 +

        curiosity * 0.4 +

        future * 0.8;

    // keep best
    if (total > best) {
        best = total;
    }

    // remove visited after branch ends
    visited.delete(nextId);

  });

    // return best future chain
    return best;
}

function replayEpisodes() {

    // pick random successful episode

        episodes[
            Math.floor(Math.random() * episodes.length)

    // ===================================== 
    // 🚫 skip boring tiny loops
    // =====================================
    const uniqueSteps =
    new Set(ep);

    // skip repeated junk
    if (uniqueSteps.size <= 2) {

    console.log(
        "🚫 boring replay skipped"
    );
    return;
    }

    console.log(
        "🧠 Replaying episode:",
        ep.join(" -> ")
    );

    // replay every step
    for (let i = 0; i < ep.length - 1; i++) {

        // current word
        const fromLabel = ep[i];

        // next word
        const toLabel = ep[i + 1];

        let fromId = null;
        let toId = null;

        // find neuron IDs
        neuronMap.forEach((n, id) => {

            if (n.userData.label === fromLabel) {
                fromId = id;
            }

            if (n.userData.label === toLabel) {
                toId = id;
            }

        });

        // safety
        if (fromId == null || toId == null) continue;

        // =========================
        // strengthen transition memory
        // =========================

        const map =
            transitions.get(fromId) || new Map();

        map.set(
            toId,
            (map.get(toId) || 0) + 0.5
        );

        transitions.set(fromId, map);

        // =========================
        // strengthen reward memory
        // =========================

        const key =
            fromId + "->" + toId;

        rewards.set(
            key,
            (rewards.get(key) || 0) + 0.2
        );

        // =========================
        // strengthen Q-learning
        // =========================

        const oldQ =
            getQ(fromId, toId);

        setQ(
            fromId,
            toId,
            oldQ + 0.05
        );

        // =========================
        // train embeddings again
        // =========================

        trainEmbedding(fromId, toId);

    }

}

  (rewards.get(key) || 0) + 1
  );
  // ================== REWARD WHOLE RECENT PATH ==================

  // reward all recent successful thoughts
  for (let i = 0; i < recentMemory.length - 1; i++) {

    const from = recentMemory[i];
    const to = recentMemory[i + 1];

    const pathKey = from + "->" + to;

    rewards.set(
        pathKey,
        (rewards.get(pathKey) || 0) + 0.5
    );
  }
}

// ===============================
// ⚠️ 3. PENALTY (wrong path), this path was not good
// ===============================
else {
  
  penalties.set(
  key,
  (penalties.get(key) || 0) + 0.3
);
}




// ================== 🧠 MEMORY LEARNING ==================

const map = transitions.get(prev) || new Map();
// 👉 get memory of previous neuron

map.set(current, (map.get(current) || 0) + 1);
// 👉 increase strength of this path

transitions.set(prev, map);
// 👉 save back to memory

// ================== 🎯 REWARD SYSTEM ==================

if (goalNeuronId && current === goalNeuronId) {

    // 👉 if we reached goal

    const key = prev + "->" + current; // current successful step

    rewards.set(
        key,
        (rewards.get(key) || 0) + 3
    ); // give normal reward

    console.log("🎉 Goal-reached → reward!"); // show success



    // ==========================================
    // 🧠 LONG-TERM EPISODIC MEMORY REINFORCEMENT
    // reward COMPLETE successful chain
    // example:
    // lion -> hunt -> meat -> eat
    // ==========================================

    recentMemory.forEach((step, i) => {

        const old = episodeRewards.get(step) || 0; // old memory strength

        episodeRewards.set(                       // strengthen full successful chain

            step,

            old + ((i + 1) * 2)

            // later steps get stronger reward
            // lion->hunt = +2
            // hunt->meat = +4
            // meat->eat = +6

        );

    });



    console.log("🧠 Full episode reinforced");

}

// ================== ❌ PENALTY SYSTEM ==================

if (safeScore < 0){                              // only punish very bad path
  // 👉 sometimes punish random paths
  
  const badKey = prev + "->" + current;
  
  penalties.set(badKey, (penalties.get(badKey) || 0) + 0.1);
}

// ================== ⚡ SIGNAL SYSTEM ==================

const signalKey = prev + "->" + current;

signals.set(signalKey, (signals.get(signalKey) || 0) + 1);       // 👉 stronger signal = more important path


// ================== ⏱ TIME MEMORY ==================

const timeKey = prev + "->" + current;

timeMemory.set(timeKey, Date.now());
// 👉 remember when this path was used

console.log("🧠 Self learned:", prev, "→", current);
}

// ================== UPDATE MEMORY ==================

agentLast = agentCurrent;                       // 👉 store current as "previous" for next step


// ================== MOVE FORWARD ==================

if (next !== null) {
  agentCurrent = next;
  // 👉 agent moves to next neuron

  // ======================================
  // 🧠 VISUAL TRAINING FLOW
  // show brain movement during learning
  // ======================================

  // get neurons
  const fromNeuron =
  findNeuronById(agentLast);

  const toNeuron =
  findNeuronById(next);

  // safety check
  if (fromNeuron && toNeuron) {

      // create line
      const geometry =
      new THREE.BufferGeometry().setFromPoints([

          fromNeuron.position,

          toNeuron.position

      ]);

      // glowing learning color
      const material =
      new THREE.LineBasicMaterial({

          color: 0x00ffff,

          transparent: true,

          opacity: 0.8

      });

      // create visual path
      const line =
      new THREE.Line(geometry, material);

      group.add(line);

      // remove later
      setTimeout(() => {

          group.remove(line);

      }, 1500);

      // ======================================
      // moving thought dot
      // ======================================

      const dot =
      new THREE.Mesh(

          new THREE.SphereGeometry(0.05, 8, 8),

          new THREE.MeshBasicMaterial({

              color: 0xffff00

          })

      );

      dot.userData = {

          start: fromNeuron.position.clone(),

          end: toNeuron.position.clone(),

          progress: 0

      };

      group.add(dot);

      // animate flow
      const interval = setInterval(() => {

          dot.userData.progress += 0.03;

          // reached destination
          if (dot.userData.progress >= 1) {

              group.remove(dot);

              clearInterval(interval);

              return;
          }

          // move dot
          dot.position.lerpVectors(

              dot.userData.start,

              dot.userData.end,

              dot.userData.progress

          );

      }, 30);
  }
  
  // add visited neuron to recent memory
  recentMemory.push(agentCurrent);
  // keep memory small
  if (recentMemory.length > 6) {
    recentMemory.shift();
  }
  
  // store thinking history
  thoughtTrail.push(agentCurrent);
  
  // keep trail small
  if (thoughtTrail.length > 6) {
    thoughtTrail.shift();
  }
}


// 🧠 move forward (like brain thinking next step)
//agentCurrent = goalNeuronId || agentCurrent;

}

// ================= SAFE LOOP CONTROLLER =================
function runAgentLoop() {
  
  if (!agentRunning) return; // 🛑 stop if turned off
  
  for (let i = 0; i < 5; i++) {
    runAgent();                    // 5 thinking steps per frame
  }
  
  loopId = setTimeout(runAgentLoop, agentSpeed); // 🔁 repeat safely
  
}

// ================== 🤖 CONTROL ==================

// press SPACE → start / stop AI
window.addEventListener("keydown", (e) => {
  // if SPACE key is pressed
  if (e.code === "Space") {
    
    if (!agentRunning) {
      agentRunning = true;
      console.log("🚀 Agent STARTED");
      runAgentLoop(); // start Safe loop
    } else {
    agentRunning = false;
    console.log("⛔ Agent STOPPED");
    clearTimeout(loopId);                      // stop loop completely
  }
}
});


// ================== CLICK ==================
// memory

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let lastClicked = null;

window.addEventListener('click', (event) => {
  
  // Convert mouse to 3D space
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  const intersects = raycaster.intersectObjects(group.children);
  
  if (intersects.length === 0) return;
  
  const obj = intersects.find(i => i.object.userData.isNeuron)?.object;
  
  if (!obj) return;
  
  console.log("Neuron clicked:", obj.userData.label);
  
  // reset colors
  neuronMap.forEach(n => {
    n.material.color.set(0xffffff);
  });
  
  // highlight clicked
  obj.material.color.set(0xff0000);
  
  // highlight neighbors
  obj.userData.neighbors.forEach(id => {
    const n = findNeuronById(id);
    if (n) n.material.color.set(0x00ff00);
  });
  
  // ================== LEARNING (VERY IMPORTANT) ==================
  
  if (window.lastNeuron !== undefined) {
    
    // 🧠 CHAIN LEARNING (NEW)
    if (thoughtTrail.length >= 2) {
      
      const prev = thoughtTrail[thoughtTrail.length - 2];
      const current = thoughtTrail[thoughtTrail.length - 1];
      // curiosity learning (track explored paths)\
      const curKey = prev + "->" + current;
      curiosityMap.set(curKey, (curiosityMap.get(curKey) || 0) + 1);
      
      // strengthen connection
      const map = transitions.get(prev) || new Map();
      map.set(current, (map.get(current) || 0) + 2); // stronger than normal
      transitions.set(prev, map);
      
      // reward chain
      const key = prev + "->" + current;
      rewards.set(key, (rewards.get(key) || 0) + 2);
      
      console.log("🧠 Chain learned:", prev, "→", current);
    }
    
    
    const prev = window.lastNeuron;
    const current = obj.userData.id;
    
    trainEmbedding(prev, current);
    
    // get memory map of previous neuron
    const map = transitions.get(prev) || new Map();
    
    // increase strength
    map.set(current, (map.get(current) || 0) + 1);
    
    // 🔥 SIGNAL LEARNING
    const signalKey = prev + "->" + current;
    signals.set(signalKey, (signals.get(signalKey) || 0) + 1);
    
    // 🧠 SIGNAL DECAY (forget slowly)
    signals.forEach((value, key) => {
      signals.set(key, value * 0.99);
    });
    
    // ❌ weaken wrong paths
    map.forEach((value, key) => {
      if (key !== current) {
        map.set(key, value * 0.9);
      }
    });
    
    // save back
    transitions.set(prev, map);
    
    console.log("🧠 Learned:", prev, "→", current);
  }
  
  // store current as last
  window.lastNeuron = obj.userData.id;
  
  // 🔥 increase attention for this neuron
  const id = obj.userData.id;
  attentionMap.set(id, (attentionMap.get(id) || 0) + 1);
  
  // decay others (forget old focus)
  attentionMap.forEach((value, key) => {
    if (key !== id) {
      attentionMap.set(key, value * 0.95);
    }
  });
  
  // Run prediction
  console.log("Prediction running")
  
  const clickedId = obj.userData.id;
  // set goal (right-click idea simulated)
  if (event.shiftKey) {                     // normal click -> run prediction, SHIFT + click -> set goal
    goalNeuronId = clickedId;
    console.log(" Goal set:", goalNeuronId);
    return;
  }
  currentGoal = obj.userData.label;         // set goal as clicked label
  
  // save click in memory
  thoughtTrail.push(clickedId);
  
  // keep only last 3 clicks
  if (thoughtTrail.length > 3) {
    thoughtTrail.shift();
  }
  
  // keep only last 5 steps
  if (thoughtTrail.length > 5) {
    thoughtTrail.shift();
  }
  
  // learn pattern like "1-2 → 3"
  if (thoughtTrail.length >= 2) {
    
    const pattern = thoughtTrail.slice(0, -1).join("->"); // "1-2"
    const next = thoughtTrail[thoughtTrail.length - 1];  // "3"
    
    let map = chainMemory.get(pattern);
    
    if (!map) {
      map = new Map();
      chainMemory.set(pattern, map);
    }
    
    map.set(next, (map.get(next) || 0) + 1);
  }
  
  runPrediction(clickedId);
  
  // learning
  //if (window.lastClicked !== undefined) {
    //learn(window.lastClicked, clickedId);
    //}
  
  // 🧠 store time for previous → current
  if (window.lastClicked !== undefined) {
    
    const timeKey = window.lastClicked + "->" + clickedId;
    
    timeMemory.set(timeKey, Date.now());
  }
  
  // update last clicked AFTER storing
  window.lastClicked = clickedId;
  
});

window.addEventListener('keydown', (e) => {
  
  // If key is 'a'
  if (e.key === 'a') {
    
    // Toggle(switch) (ON → OFF, OFF → ON)
    agentActive = !agentActive;
    
    // Show status in console
    console.log("🤖 Agent:", agentActive ? "STARTED" : "STOPPED");
    
    // If turned ON → start thinking
    if (agentActive) agentLoop();
  }
});
