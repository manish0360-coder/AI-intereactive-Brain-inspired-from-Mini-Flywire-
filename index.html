<!-- Load Three.js (3D engine) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// ================== SCENE SETUP ==================

// Create 3D world
const scene = new THREE.Scene();

// Create camera (how we see the world)
const camera = new THREE.PerspectiveCamera(
  75,                                     // field of view
  window.innerWidth / window.innerHeight, // screen ratio
  0.1,                                    // near
  1000                                    // far
);

// Move camera back so we can see objects
camera.position.z = 3;

// Create renderer (draws everything)
const renderer = new THREE.WebGLRenderer();

// Set size = full screen
renderer.setSize(window.innerWidth, window.innerHeight);

// Add canvas to page
document.body.appendChild(renderer.domElement);

// Group = container of all neurons + lines
const group = new THREE.Group();

// Add group into scene
scene.add(group);


// ================== DATA STORAGE ==================

const neuronPositions = [];   // stores positions
const neuronMap = new Map(); // stores neurons by id

// 🧠 EMBEDDING SYSTEM (AI brain vector)
function createEmbedding() {
  return [
    Math.random(),
    Math.random(),
    Math.random()
  ];
}

// 🧠 DOT PRODUCT (how similar 2 neurons are)
function dot(a, b) {
  if (!a || !b) return 0;

  let sum = 0;

  for (let i = 0; i < a.length; i++) {
    sum += a[i] * b[i];
  }

  return sum;
}

// 🧠 TRAIN EMBEDDINGS (learning step)
function trainEmbedding(id1, id2) {

  const n1 = findNeuronById(id1);
  const n2 = findNeuronById(id2);

  if (!n1 || !n2) return;

  const emb1 = n1.userData.embedding;
  const emb2 = n2.userData.embedding;

  const lr = 0.05;

  // ===== MAKE THEM SIMILAR =====
  for (let i = 0; i < emb1.length; i++) {

    const diff = emb2[i] - emb1[i];

    emb1[i] += diff * lr;
    emb2[i] -= diff * lr;
  }

  normalize(emb1);
  normalize(emb2);

  // ===== PUSH OTHERS AWAY =====
  neuronMap.forEach((other, id) => {

    if (id === id1 || id === id2) return;

    const embOther = other.userData.embedding;

    for (let i = 0; i < emb1.length; i++) {

      const diff = embOther[i] - emb1[i];

      embOther[i] += diff * 0.01;
    }

  });

  console.log("🔥 Embedding trained:", id1, "<->", id2);
}

const lines = [];            // stores connections




function similarity(a, b) {
  let dot = 0;

  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
  }

  return dot; // bigger = more similar
}

function normalize(vec) {

  let mag = 0;

  for (let i = 0; i < vec.length; i++) {
    mag += vec[i] * vec[i];
  }

  mag = Math.sqrt(mag);

  if (mag === 0) return vec;

  for (let i = 0; i < vec.length; i++) {
    vec[i] /= mag;
  }

  return vec;
}

fetch('neurons.json')
  .then(res => res.json())
  .then(data => {

    data.forEach(n => {

      // Create position vector
      const SCALE = 1.0; // or 10 if you want bigger

      const pos = new THREE.Vector3(
        n.x * SCALE,
        n.y * SCALE,
        n.z * SCALE
      );

      neuronPositions.push(pos);

      // Create small sphere (neuron)
      const neuron = new THREE.Mesh(
        new THREE.SphereGeometry(0.10, 13, 13),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );

      // Set position
      neuron.position.copy(pos);

      // Store custom data
      neuron.userData = {
        isNeuron: true,
        id: n.id,
        label: n.label,
        type: n.type,
        neighbors: [],   // important for graph brain
        embedding: createEmbedding()
      };

      // Save in map
      neuronMap.set(n.id, neuron);

      // Add to scene
      group.add(neuron);
    });

    console.log("✅ Neurons loaded");

    // 🧠 INITIAL MEANING TRAINING
    neuronMap.forEach((n1) => {
      const label1 = n1.userData.label;

      const related = conceptRelations[label1] || [];

      neuronMap.forEach((n2) => {
        const label2 = n2.userData.label;

        if (related.includes(label2)) {
          trainEmbedding(n1.userData.id, n2.userData.id);
        }
      });
    });

    // Now load connections
    return fetch('connections.json');
  })
  .then(res => res.json())
  .then(data => {

    data.forEach(c => {

      const n1 = findNeuronById(c.from);
      const n2 = findNeuronById(c.to);

      if (!n1 || !n2) return;

      // Connect neurons
      connectPoints(n1.position, n2.position, 0x4444ff, c.from, c.to);
    });

    console.log("✅ Connections loaded");
  });


// ================== STARS BACKGROUND ==================

// Geometry = positions of stars
const starGeometry = new THREE.BufferGeometry();

const starPositions = [];

for (let i = 0; i < 1000; i++) {

  // random positions in space
  starPositions.push(
    (Math.random() - 0.5) * 50,
    (Math.random() - 0.5) * 50,
    (Math.random() - 0.5) * 50
  );
}

// Attach positions to geometry
starGeometry.setAttribute(
  'position',
  new THREE.Float32BufferAttribute(starPositions, 3)
);

// Create stars material
const stars = new THREE.Points(
  starGeometry,
  new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.05
  })
);

// Add stars to scene
scene.add(stars);


// ================== HELPERS ==================

// Find neuron by ID
function findNeuronById(id) {
  return neuronMap.get(Number(id));
}

// Connect two neurons
function connectPoints(p1, p2, color, id1, id2) {

  const geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);

  const material = new THREE.LineBasicMaterial({ color });

  const line = new THREE.Line(geometry, material);

  group.add(line);

  lines.push(line);

  // Save neighbors (IMPORTANT FOR AI)
  const n1 = neuronMap.get(id1);
  const n2 = neuronMap.get(id2);

  if (!n1 || !n2) return;

  n1.userData.neighbors.push(id2);
  n2.userData.neighbors.push(id1);
}


// ================== PREDICTION SYSTEM ==================

const transitions = new Map();  // memory
const rewards = new Map();
const penalties = new Map();    // Bad path memory
const signals = new Map();  // Signal strength
const thoughtTrail = [];
const curiosityMap = new Map();  // how much we explored each path

let currentGoal = null;  // what brain wants right now
// sequence memory (pattern -> next)
const chainMemory = new Map();
const attentionMap = new Map();   // create attention memmory ( focus strength)
// stores last time each path was used
const timeMemory = new Map();
// Target goal (brain wants to reach this)
let goalNeuronId = null;

// 🧠 MEANING RELATIONS (STEP-1 ADD HERE)
const conceptRelations = {
  dog: ["food","bone","home","human"],
  cat: ["milk","food","home"],
  lion: ["meat","hunt","forest"],
  tiger: ["meat","hunt","forest"],

  food: ["eat"],
  meat: ["eat"],
  milk: ["drink"],

  hunt: ["meat"],
  eat: [],
  drink: [],

  forest: ["hunt","lion","tiger"],
  home: ["dog","cat","human"],
  human: ["home","dog"]
};

// 🧠 LOOK-AHEAD FUNCTION (----*****------   future thinking  ------******-------...............----------->>>>>>>>>>>>>>)
function lookAheadScore(startId, goalId, depth = 2) {
  // startId = where we are now
  // goalId = where we want to go
  // depth = how many steps we look ahead

  if (!goalId) return 0; 
  // if no goal → no future thinking

  const visited = new Set(); 
  // we remember where we already went (to avoid looping)

  function dfs(currentId, d) {
    // dfs = explore paths step by step
    // currentId = current node
    // d = how many steps left

    if (d === 0) return 0;
    // no steps left → stop

    const neuron = findNeuronById(currentId);
    const goalNeuron = findNeuronById(goalId);

    if (!neuron || !goalNeuron) return 0;
    // if something missing → stop

    // 🎯 how close current node is to goal
    let best = similarity(
      neuron.userData.embedding,
      goalNeuron.userData.embedding
    );

    visited.add(currentId);
    // mark this node as visited

    neuron.userData.neighbors.forEach(nextId => {
      // check all next possible nodes

      if (visited.has(nextId)) return;
      // don't go back to same place

      const future = dfs(nextId, d - 1);
      // go one step deeper (future thinking)

      // combine current + future
      best = Math.max(best, future * 0.8);
      // if future path is better → take it
    });

    visited.delete(currentId);
    // remove from visited (so other paths can use it)

    return best;
    // return best future score
  }

  return dfs(startId, depth);
  // start exploring from current node
}

// 🧠 REACHABILITY CHECK (true reasoning)
// This function checks: "Can this node reach the goal in few steps?"
function canReachGoal(startId, goalId, maxDepth = 4) {

  // If no goal → allow everything
  if (!goalId) return true;

  const visited = new Set(); // remember visited nodes

  // DFS = explore neighbors step by step
  function dfs(currentId, depth) {

    // stop if depth finished
    if (depth === 0) return false;

    // 🎯 reached goal → success
    if (currentId === goalId) return true;

    visited.add(currentId);

    const neuron = findNeuronById(currentId);
    if (!neuron) return false;

    // check all neighbors
    for (let nextId of neuron.userData.neighbors) {

      // skip already visited (avoid loop)
      if (visited.has(nextId)) continue;

      // if ANY path reaches goal → true
      if (dfs(nextId, depth - 1)) return true;
    }

    return false; // no path found
  }

  return dfs(startId, maxDepth);
}


function runPrediction(startKey) {

  let currentKey = startKey;

  const STEPS = 2;

  for (let step = 0; step < STEPS; step++) {
    // Define starNeuron
    const startNeuron = findNeuronById(currentKey);
    if (!startNeuron) return;

    const memoryMap = transitions.get(currentKey) || new Map();
    // get last 2 clicks pattern
    const recentPattern = thoughtTrail.slice(-2).join("-");
    // get learned next predictions
    const chainMap = chainMemory.get(recentPattern) || new Map();

    const structureMap = new Map();
    startNeuron.userData.neighbors.forEach(id => {
      structureMap.set(id, 1);
    });

    const embeddingMap = new Map();

    neuronMap.forEach((neuron, id) => {

      if (id === currentKey) return;

      const sim = similarity(
        startNeuron.userData.embedding,
        neuron.userData.embedding
      );

      embeddingMap.set(id, sim * 2); // weight
    });

    

    if (!startNeuron) return;

    // Get neighbors (graph brain)
    startNeuron.userData.neighbors.forEach(id => {
      structureMap.set(id, 1);
    });

    const choices = [];

    // Memory weight
    memoryMap.forEach((value, k) => {

      // Block paths that cannot reach goal
      if (goalNeuronId !== null && !canReachGoal(k, goalNeuronId)) {
        return;                         // skip this option completely
      }
      
      // skip Bad Paths
      // If this node cannot reach goal -> ignore it completely
      if (goalNeuronId && !canReachGoal(k, goalNeuronId)) {
        return;
      }

      const targetNeuron = findNeuronById(k);
      if (!targetNeuron) return;

      const label1 = startNeuron.userData.label;
      const label2 = targetNeuron.userData.label;

      // logic filter
      if (conceptRelations[label1]) {
        if (!conceptRelations[label1].includes(label2)) {
          return;
        }
      }

      const score =
        similarity(startNeuron.userData.embedding, targetNeuron.userData.embedding);

      const memoryBoost = Math.log(value + 1);

      //Reward from learning


      const attention = startNeuron.userData.neighbors.includes(k) ? 2 : 1;

      const signalKey = currentKey + "-" + k;
      const signal = signals.get(signalKey) || 0;

      // 🧠 TIME DECAY

      const timeKey = currentKey + "-" + k;

      // last used time
      const lastUsed = timeMemory.get(timeKey) || 0;  

      // how long ago (ms)
      const age = Date.now() - lastUsed;

      // decay formula (new = high, old = low)
      const timeScore = Math.exp(-age / 5000);


      // 🧠 gentle goal guidance (not forcing)
      let goalBoost = 0;

      if (goalNeuronId !== null) {

        const goalNeuron = findNeuronById(goalNeuronId);

        if (goalNeuron && targetNeuron) {

          const goalSim = similarity(
            targetNeuron.userData.embedding,
            goalNeuron.userData.embedding
          );

          // small push toward goal (not overpowering)
          goalBoost = Math.max(0, goalSim) * 2;

          // slight bonus if exact goal
          if (k === goalNeuronId) {
            goalBoost += 3;
          }
        }
      }
    
  

      // Goal BOOST (how close to goal)
      //let goalBoost = 0;
      //if (currentGoal && label2 === currentGoal) {
        //goalBoost = 15;                              // direct hit
      //}

      let meaningBoost = 0;

      if (conceptRelations[label1]?.includes(label2)) {
      meaningBoost = 2; // 🔥 strong relation
      }

      const focus = attentionMap.get(k) || 0;
   
      const chainBoost = (chainMap.get(k) || 0) * 0.7;     // penalty for wrong chains


      // get reward value for this path
      const reward = rewards.get(currentKey + '-' + k) || 0;
      // future thinking score ( look ahead 2 steps )
      // if this node can reach goal -> give extra importance 
      const futureScore = lookAheadScore(k, goalNeuronId, 2);
      // punishment bad paths
      const penalty = penalties.get(currentKey + '_' + k) || 0;
      // curiosity (less visited = more interesting)
      const curKey = currentKey + "-" + k;
      const visits = curiosityMap.get(curKey) || 0;
      // fewer visits = higher curiosity
      const curiosityBoost = 1 / (visits + 1);

      const finalWeight =
        (
          score +                               // similarity
          memoryBoost +                         // frequency
          reward * 2 - penalty * 3  +           // reward good, punish bad
          signal * 3 +                          // signal strength    
          focus * 2 +                           // attention
          chainBoost * 4 +                      // sequence memory
          timeScore * 3 +                       // 🧠 recent importance
          goalBoost  +                           // new intelligence ( very important )
          futureScore * 8 +                     // future thinking ----- =5 -> matters a lot >>>>>
          curiosityBoost * 2                    // curiosity add
        ) * attention;

        choices.push({
          key: k,
          weight: finalWeight
        });
    });

    // pick best choice (highest weight)
    const best = choices.sort((a,b) => b.weight - a.weight)[0];

    let chosenKey = null;
    if (best) {
      chosenKey = best.key;       // remember what brain picked
    }
    // reward system (strengthen correct path)
    if (best) {
      const rewardKey = currentKey + "-" + best.key;
      rewards.set(rewardKey, (rewards.get(rewardKey) || 0) + 1);
    }
    // punish other wrong choices
    choices.forEach(c => {
      if (c.key !== chosenKey) {
        const badKey = currentKey + "_" + c.key;
        penalties.set(badKey, (penalties.get(badKey) || 0) + 0.5);
      }
    }); 

 
    // Structure weight
    structureMap.forEach((value, k) => {

      // Block paths that cannot reach goal
      if (goalNeuronId !== null && !canReachGoal(k, goalNeuronId)) {
        return;                         // skip this option completely
      }

      // skip nodes that can't reach goal
      if (goalNeuronId && !canReachGoal(k, goalNeuronId)) {
        return;
      }

      const targetNeuron = findNeuronById(k);
      if (!targetNeuron) return;

      const label1 = startNeuron.userData.label;
      const label2 = targetNeuron.userData.label;

      // logic filter
      if (conceptRelations[label1]) {
        if (!conceptRelations[label1].includes(label2)) {
          return;
        }
      }

      const score =
        similarity(startNeuron.userData.embedding, targetNeuron.userData.embedding);

      if (!choices.find(c => c.key === k)) {
        choices.push({
          key: k,
          weight: score
        });
      }
    });

    embeddingMap.forEach((value, k) => {

      // Block paths that cannot reach goal
      if (goalNeuronId !== null && !canReachGoal(k, goalNeuronId)) {
        return;                         // skip this option completely
      }

      // skip nodes that can't reach goal
      if (goalNeuronId && !canReachGoal(k, goalNeuronId)) {
        return;
      }

      const targetNeuron = findNeuronById(k);
      if (!targetNeuron) return;

      const label1 = startNeuron.userData.label;
      const label2 = targetNeuron.userData.label;

      // logic filter
      if (conceptRelations[label1]) {
        if (!conceptRelations[label1].includes(label2)) {
          return;
        }
      }

      if (!choices.find(c => c.key === k)) {
        choices.push({
          key: k,
          weight: value
        });
      }
    });

    if (choices.length === 0) return;

    // ===== SOFTMAX =====

    let expSum = 0;

    choices.forEach(c => {
      c.exp = Math.exp(c.weight);
      expSum += c.exp;
    });

    // Convert to probability
    choices.forEach(c => {
      c.prob = c.exp / expSum;
    });

    // confidence = how strong top choices is 
    const topProb = choices[0]?.prob || 0;
    const confidence = topProb; // 0 -> unsure, 1 -> very sure

    // Sort highest first
    choices.sort((a, b) => b.prob - a.prob);

    // Take top 3
    // 🧠 if confident → take 1 path
    // 🧠 if unsure → explore more
    let topChoices;

    if (confidence > 0.7) {
      topChoices = choices.slice(0, 1); // focused
    } else if (confidence > 0.4) {
      topChoices = choices.slice(0, 2); // medium
    } else {
      topChoices = choices.slice(0, 3); // explore
    }

    // ===== DRAW MULTI PATH =====
    topChoices.forEach(choice => {

      const neuron = findNeuronById(choice.key);
      const prevNeuron = findNeuronById(currentKey);

      if (!neuron || !prevNeuron) return;

      // Draw line
      const geometry = new THREE.BufferGeometry().setFromPoints([
        prevNeuron.position,
        neuron.position
      ]);

      const material = new THREE.LineBasicMaterial({
        color: new THREE.Color().setHSL(
          0.7 - choice.prob * 0.7,
          1,
          0.4 + choice.prob * 0.4
        ),
        transparent: true,
        opacity: 0.2 + choice.prob * confidence   // confident = brighter path, confused = faint paths
      });

      const line = new THREE.Line(geometry, material);

      group.add(line);

      // remove after time
      setTimeout(() => group.remove(line), 1000);

      // ===== DOT FLOW =====
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
      );

      dot.userData = {
        start: prevNeuron.position.clone(),
        end: neuron.position.clone(),
        progress: 0
      };

      group.add(dot);

      const interval = setInterval(() => {

        dot.userData.progress += 0.05;

        if (dot.userData.progress >= 1) {
          group.remove(dot);
          clearInterval(interval);
          return;
        }

        dot.position.lerpVectors(
          dot.userData.start,
          dot.userData.end,
          dot.userData.progress
        );

      }, 30);
    });

    // Move forward
    currentKey = topChoices[0].key;
  }
}


// ================== ANIMATION ==================

function animate() {

  requestAnimationFrame(animate);

  // slow star rotation
  stars.rotation.y += 0.0005;

  renderer.render(scene, camera);
}

animate();


// ================== CLICK ==================
// memory

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let lastClicked = null;

window.addEventListener('click', (event) => {

  // Convert mouse to 3D space
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const intersects = raycaster.intersectObjects(group.children);

  if (intersects.length === 0) return;

  const obj = intersects.find(i => i.object.userData.isNeuron)?.object;

  if (!obj) return;

  console.log("Neuron clicked:", obj.userData.label);

  // reset colors
  neuronMap.forEach(n => {
    n.material.color.set(0xffffff);
  });

  // highlight clicked
  obj.material.color.set(0xff0000);

  // highlight neighbors
  obj.userData.neighbors.forEach(id => {
    const n = findNeuronById(id);
    if (n) n.material.color.set(0x00ff00);
  });

  // ================== LEARNING (VERY IMPORTANT) ==================

  if (window.lastNeuron !== undefined) {
    
    // 🧠 CHAIN LEARNING (NEW)
    if (thoughtTrail.length >= 2) {

      const prev = thoughtTrail[thoughtTrail.length - 2];
      const curr = thoughtTrail[thoughtTrail.length - 1];
      // curiosity learning (track explored paths)\
      const curKey = prev + "-" + curr;
      curiosityMap.set(curKey, (curiosityMap.get(curKey) || 0) + 1);

      // strengthen connection
      const map = transitions.get(prev) || new Map();
      map.set(curr, (map.get(curr) || 0) + 2); // stronger than normal
      transitions.set(prev, map);

      // reward chain
      const key = prev + "-" + curr;
      rewards.set(key, (rewards.get(key) || 0) + 2);

      console.log("🧠 Chain learned:", prev, "→", curr);
    }
    

    const prev = window.lastNeuron;
    const curr = obj.userData.id;

    trainEmbedding(prev, curr);

    // get memory map of previous neuron
    const map = transitions.get(prev) || new Map();

    // increase strength
    map.set(curr, (map.get(curr) || 0) + 1);

    // 🔥 SIGNAL LEARNING
    const signalKey = prev + "-" + curr;
    signals.set(signalKey, (signals.get(signalKey) || 0) + 1);

    // 🧠 SIGNAL DECAY (forget slowly)
    signals.forEach((value, key) => {
      signals.set(key, value * 0.99);
    });

    // ❌ weaken wrong paths
    map.forEach((value, key) => {
      if (key !== curr) {
        map.set(key, value * 0.9);
      }
    });

    // save back
    transitions.set(prev, map);

    console.log("🧠 Learned:", prev, "→", curr);
  }

  // store current as last
  window.lastNeuron = obj.userData.id;

  // 🔥 increase attention for this neuron
  const id = obj.userData.id;
  attentionMap.set(id, (attentionMap.get(id) || 0) + 1);

  // decay others (forget old focus)
  attentionMap.forEach((value, key) => {
    if (key !== id) {
      attentionMap.set(key, value * 0.95);
    }
  });

  // Run prediction
  console.log("Prediction running")

  const clickedId = obj.userData.id;
  // set goal (right-click idea simulated)
  if (event.shiftKey) {                     // normal click -> run prediction, SHIFT + click -> set goal
    goalNeuronId = clickedId;
    console.log(" Goal set:", goalNeuronId);
    return;  
  }
  currentGoal = obj.userData.label;         // set goal as clicked label

  // save click in memory
  thoughtTrail.push(clickedId);

  // keep only last 3 clicks
  if (thoughtTrail.length > 3) {
    thoughtTrail.shift();
  }

  // keep only last 5 steps
  if (thoughtTrail.length > 5) {
    thoughtTrail.shift();
  }

  // learn pattern like "1-2 → 3"
  if (thoughtTrail.length >= 2) {

    const pattern = thoughtTrail.slice(0, -1).join("-"); // "1-2"
    const next = thoughtTrail[thoughtTrail.length - 1];  // "3"

    let map = chainMemory.get(pattern);

    if (!map) {
      map = new Map();
      chainMemory.set(pattern, map);
    }

    map.set(next, (map.get(next) || 0) + 1);
  }

  runPrediction(clickedId);

  // learning
  //if (window.lastClicked !== undefined) {
    //learn(window.lastClicked, clickedId);
  //}

  // 🧠 store time for previous → current
  if (window.lastClicked !== undefined) {

    const timeKey = window.lastClicked + "-" + clickedId;

    timeMemory.set(timeKey, Date.now());
  }

  // update last clicked AFTER storing
  window.lastClicked = clickedId;
